<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水資源文物展示館 · 語音導覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-deep: #0a3d62;
    --blue-mid: #1a6fa8;
    --blue-light: #4fa3d4;
    --blue-pale: #d6ecf8;
    --green-deep: #1a4a2e;
    --green-mid: #2d7a4f;
    --green-accent: #4caf7d;
    --white: #f8fbfd;
    --gray-soft: #e8f0f5;
    --text-dark: #0d2233;
    --text-mid: #3a5a72;
    --text-light: #7fa8c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--white);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--blue-deep);
    position: relative;
    overflow: hidden;
    padding: 2.5rem 2rem 2rem;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 100%, rgba(77,163,212,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 80% at 90% 0%, rgba(45,122,79,0.15) 0%, transparent 55%);
  }

  /* wave decoration */
  .wave-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg,
      var(--green-accent) 0%, var(--blue-light) 40%,
      var(--green-accent) 70%, var(--blue-light) 100%);
    opacity: 0.7;
  }

  .header-inner {
    position: relative;
    max-width: 860px;
    margin: 0 auto;
  }

  .museum-label {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: var(--blue-light);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .museum-label-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem;
    font-style: italic;
    letter-spacing: 0.08em;
    color: rgba(79,163,212,0.7);
    margin-top: 0.15rem;
    display: block;
  }

  h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.25rem, 4vw, 1.85rem);
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 2.5vw, 1.05rem);
    font-style: italic;
    color: rgba(214,236,248,0.75);
    margin-top: 0.4rem;
    letter-spacing: 0.04em;
  }

  .guide-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 1.2rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(79,163,212,0.35);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.72rem;
    color: var(--blue-pale);
    letter-spacing: 0.06em;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.7); }
  }

  /* ── MAIN ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.4rem;
  }

  .section-title::before {
    content: '';
    width: 4px; height: 22px;
    background: linear-gradient(180deg, var(--blue-mid), var(--green-accent));
    border-radius: 2px;
    flex-shrink: 0;
  }

  .section-title h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--blue-deep);
  }

  .section-title span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.88rem;
    font-style: italic;
    color: var(--text-light);
    margin-left: 2px;
  }

  /* ── TOUR LIST ── */
  .tour-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tour-item {
    background: #fff;
    border: 1px solid var(--gray-soft);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.22s ease;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(10,61,98,0.05);
  }

  .tour-item:hover {
    border-color: var(--blue-light);
    box-shadow: 0 4px 16px rgba(26,111,168,0.12);
    transform: translateY(-1px);
  }

  .tour-item.active {
    border-color: var(--blue-mid);
    box-shadow: 0 4px 20px rgba(26,111,168,0.18);
  }

  .tour-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
  }

  .num-badge {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--gray-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--blue-mid);
    flex-shrink: 0;
    transition: all 0.22s;
  }

  .tour-item.active .num-badge,
  .tour-item:hover .num-badge {
    background: var(--blue-deep);
    color: #fff;
  }

  .tour-info { flex: 1; min-width: 0; }

  .tour-title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tour-title-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.78rem;
    font-style: italic;
    color: var(--text-light);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .play-icon {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--gray-soft);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.22s;
  }

  .play-icon svg {
    width: 14px; height: 14px;
    fill: var(--blue-mid);
    margin-left: 2px;
    transition: fill 0.22s;
  }

  .tour-item.active .play-icon {
    background: var(--blue-mid);
  }
  .tour-item.active .play-icon svg { fill: #fff; }
  .tour-item:hover:not(.active) .play-icon { background: var(--blue-pale); }



  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 1.5rem 1rem 2rem;
    font-size: 0.7rem;
    color: var(--text-light);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--gray-soft);
    max-width: 860px;
    margin: 0 auto;
  }

  footer a { color: var(--blue-mid); text-decoration: none; }

  @media (max-width: 480px) {
    header { padding: 2rem 1.25rem 1.75rem; }
    .tour-header { gap: 10px; padding: 12px 14px; }
    .num-badge { width: 34px; height: 34px; font-size: 0.95rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="museum-label">台灣自來水公司 · 第一區管理處
      <span class="museum-label-en">Taiwan Water Corporation · FIRST BRANCH</span>
    </p>
    <h1>水資源文物展示館</h1>
    <p class="subtitle">Water Resources Heritage Museum</p>
    <div class="guide-badge">
      <span class="dot"></span>
      語音導覽 · Audio Guide &nbsp;|&nbsp; 10 站
    </div>
  </div>
  <div class="wave-bar"></div>
</header>

<main>
  <div class="section-title">
    <h2>導覽清單 <span>Tour Stops</span></h2>
  </div>

  <div class="tour-list" id="tourList"></div>
</main>

<footer>
  © 台灣自來水公司第一區管理處 &nbsp;·&nbsp;
  <a href="https://www.water.gov.tw" target="_blank">water.gov.tw</a>
</footer>

<script>
const stops = [
  { num:"01", zh:"這裡是哪裡",              en:"Where Are We?",              yt:"https://youtu.be/86fV3H8oKdY" },
  { num:"02", zh:"為什麼在基隆？",           en:"Why Keelung?",               yt:"https://youtu.be/59q3jDp5R0Q" },
  { num:"03", zh:"淡水水道",               en:"The Tamsui Waterway",         yt:"https://youtu.be/IGcW74OzoZA" },
  { num:"04", zh:"為什麼是英國人？",         en:"Why the British?",            yt:"https://youtu.be/du48NnsqFRU" },
  { num:"05", zh:"為什麼自來水叫「水道水」？", en:"Why Called 'Suidomizu'?",    yt:"https://youtu.be/ixFOLledwLM" },
  { num:"06", zh:"基隆水道",               en:"The Keelung Waterway",        yt:"https://youtu.be/ailxhJ97vdM" },
  { num:"07", zh:"水源涵養林",             en:"Watershed Forest",            yt:"https://youtu.be/nv7bClEA56o" },
  { num:"08", zh:"慢濾",                  en:"Slow Sand Filtration",        yt:"https://youtu.be/b5_eFo3BVUA" },
  { num:"09", zh:"幫浦間",                en:"The Pump House",              yt:"https://youtu.be/IlTzobStc0I" },
  { num:"10", zh:"西勢水庫",              en:"Xishi Reservoir",             yt:"https://youtu.be/ThRr-nqaAE4" },
];

function buildList() {
  const list = document.getElementById('tourList');
  stops.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'tour-item';
    item.innerHTML = `
      <div class="tour-header" onclick="window.open('${s.yt}','_blank')">
        <div class="num-badge">${s.num}</div>
        <div class="tour-info">
          <div class="tour-title-zh">${s.zh}</div>
          <div class="tour-title-en">${s.en}</div>
        </div>
        <div class="play-icon">
          <svg viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>
        </div>
      </div>
    `;
    list.appendChild(item);
  });
}

buildList();
</script>
</body>
</html>
